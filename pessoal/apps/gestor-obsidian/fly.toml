app = "cortex-app"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[vm]]
  memory = "1gb"
  cpus = 1
  memory_mb = 1024
