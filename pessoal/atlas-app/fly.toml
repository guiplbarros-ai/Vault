# fly.toml - Atlas App

app = 'atlas-flights-monitor'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  PORT = "3000"
  NODE_ENV = "production"
  ATLAS_TIMEZONE = "America/Sao_Paulo"
  ATLAS_SEARCH_CRONS = "0 8 * * *,0 20 * * *"
  ATLAS_DIGEST_CRON = "30 20 * * 5"
  ATLAS_SERPAPI_MONTHLY_LIMIT = "250"
  ATLAS_PROMO_CRON = "*/30 * * * *"
